<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Samplanz">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Samplanz</title>
<style>
  :root {
    --bg: #0f0f1a;
    --bg-secondary: #1a1a2e;
    --card: #1e1e36;
    --card-hover: #262645;
    --text: #f0f0f5;
    --text-secondary: #8888aa;
    --accent: #7c3aed;
    --accent-light: rgba(124,58,237,0.2);
    --accent-glow: rgba(124,58,237,0.4);
    --pink: #ec4899;
    --pink-light: rgba(236,72,153,0.2);
    --cyan: #06b6d4;
    --cyan-light: rgba(6,182,212,0.2);
    --orange: #f97316;
    --orange-light: rgba(249,115,22,0.2);
    --green: #10b981;
    --green-light: rgba(16,185,129,0.2);
    --red: #ef4444;
    --red-light: rgba(239,68,68,0.2);
    --yellow: #facc15;
    --yellow-light: rgba(250,204,21,0.15);
    --border: rgba(255,255,255,0.08);
    --border-light: rgba(255,255,255,0.12);
    --radius: 16px;
    --nav-height: 70px;
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 10px);
  }

  /* Gradient header */
  .header {
    padding: 16px 20px 12px;
    position: sticky; top: 0; z-index: 50;
    background: rgba(15, 15, 26, 0.65);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .header-left { flex: 1; }
  .header-settings-btn {
    background: none; border: none; color: var(--text-secondary);
    font-size: 20px; cursor: pointer; padding: 4px 0 0 8px;
    opacity: 0.6; line-height: 1; flex-shrink: 0;
  }
  .header-settings-btn:active { opacity: 1; }

  /* Settings sheet */
  .settings-sheet-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
    z-index: 450; align-items: flex-end; justify-content: center;
  }
  .settings-sheet-overlay.active { display: flex; }
  .settings-sheet {
    background: rgba(22, 22, 42, 0.95);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px 24px 0 0;
    width: 100%; padding: 20px 20px calc(20px + var(--safe-bottom));
    box-shadow: 0 -8px 40px rgba(0,0,0,0.4);
  }
  .settings-sheet h3 {
    font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text);
  }
  .settings-sheet p {
    font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5;
  }
  .settings-btn-row { display: flex; flex-direction: column; gap: 10px; }
  .settings-action-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 14px; border: none; cursor: pointer;
    font-size: 15px; font-weight: 600; font-family: inherit; width: 100%;
    transition: opacity 0.15s;
  }
  .settings-action-btn:active { opacity: 0.75; }
  .settings-action-btn.export {
    background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(236,72,153,0.25));
    border: 1px solid rgba(124,58,237,0.3); color: var(--text);
  }
  .settings-action-btn.import {
    background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(16,185,129,0.2));
    border: 1px solid rgba(6,182,212,0.25); color: var(--text);
  }
  .settings-action-btn .btn-icon { font-size: 20px; }
  .settings-cancel-btn {
    margin-top: 8px; width: 100%; padding: 14px; border-radius: 14px;
    border: 1px solid var(--border); background: none;
    color: var(--text-secondary); font-size: 15px; font-weight: 600;
    font-family: inherit; cursor: pointer;
  }
  .settings-cancel-btn:active { background: rgba(255,255,255,0.05); }
  .header h1 {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(
      110deg,
      #7c3aed 0%,
      #a78bfa 20%,
      #ec4899 42%,
      rgba(245, 210, 255, 0.9) 50%,
      #ec4899 58%,
      #a78bfa 80%,
      #7c3aed 100%
    );
    background-size: 250% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmerTitle 9s ease-in-out infinite;
  }
  @keyframes shimmerTitle {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }
  }
  .header .date-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }

  /* Greeting */
  .greeting { font-size: 16px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 400; }

  /* Weather widget */
  .weather-widget {
    background: linear-gradient(135deg, rgba(6,182,212,0.10), rgba(124,58,237,0.10));
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(6,182,212,0.18);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.07);
    border-radius: 16px; padding: 14px 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .weather-icon { font-size: 36px; line-height: 1; }
  .weather-info { flex: 1; }
  .weather-temp { font-size: 24px; font-weight: 800; color: var(--text); }
  .weather-desc { font-size: 13px; color: var(--text-secondary); text-transform: capitalize; margin-top: 1px; }
  .weather-details { display: flex; gap: 12px; margin-top: 4px; }
  .weather-detail { font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 3px; }
  .weather-hi-lo { font-size: 13px; color: var(--text-secondary); text-align: right; }
  .weather-hi-lo .hi { color: var(--orange); font-weight: 700; }
  .weather-hi-lo .lo { color: var(--cyan); font-weight: 700; }

  /* Tab content */
  .tab-content { display: none; padding: 8px 20px 20px; position: relative; z-index: 1; transform: translateZ(0); }
  .tab-content.active { display: block; }

  /* Cards — glassmorphism */
  .card {
    background: rgba(30, 30, 60, 0.45);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.07);
  }

  /* ===== SUMMARY CARDS ===== */
  .summary-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .summary-card {
    flex: 1; border-radius: 14px; padding: 14px 12px;
    text-align: center; position: relative; overflow: hidden;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.07);
  }
  .summary-card::before {
    content: ''; position: absolute; inset: 0; opacity: 0.12; border-radius: 14px;
  }
  .summary-card.sc-tasks { background: var(--pink-light); border: 1px solid rgba(236,72,153,0.2); }
  .summary-card.sc-tasks .num { color: var(--pink); }
  .summary-card.sc-events { background: var(--cyan-light); border: 1px solid rgba(6,182,212,0.2); }
  .summary-card.sc-events .num { color: var(--cyan); }
  .summary-card.sc-habits { background: var(--green-light); border: 1px solid rgba(16,185,129,0.2); }
  .summary-card.sc-habits .num { color: var(--green); }
  .summary-card .num { font-size: 24px; font-weight: 800; }
  .summary-card .label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }

  /* ===== TODAY'S AGENDA ===== */
  .agenda-section { margin-bottom: 16px; }
  .agenda-section h3 {
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-secondary); margin-bottom: 10px; padding-left: 2px;
  }
  .agenda-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    background: rgba(30, 30, 60, 0.4);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-radius: 12px; margin-bottom: 8px;
    border: 1px solid rgba(255,255,255,0.09);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative; overflow: hidden;
  }
  .agenda-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .agenda-icon.event { background: var(--cyan-light); }
  .agenda-icon.task { background: var(--pink-light); }
  .agenda-icon.habit { background: var(--green-light); }
  .agenda-text { flex: 1; }
  .agenda-text .title { font-size: 14px; font-weight: 500; }
  .agenda-text .title.struck { text-decoration: line-through; color: var(--text-secondary); }
  .agenda-text .subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .agenda-item.done-item { opacity: 0.5; }

  /* ===== CALENDAR ===== */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-nav button {
    background: var(--bg-secondary); border: 1px solid var(--border); font-size: 18px;
    color: var(--accent); padding: 6px 12px; cursor: pointer; border-radius: 10px;
  }
  .cal-nav button:active { background: var(--accent-light); }
  .cal-nav span { font-size: 17px; font-weight: 700; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
  .cal-grid .day-label { font-size: 11px; color: var(--text-secondary); font-weight: 600; padding: 6px 0; }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 14px; border-radius: 50%; cursor: pointer; position: relative;
    font-weight: 400; color: var(--text);
  }
  .cal-day:active { background: var(--accent-light); }
  .cal-day.today { font-weight: 800; color: var(--cyan); position: relative; }
  .cal-day.today::after {
    content: '\1F98B'; position: absolute; top: -2px; right: -2px;
    font-size: 10px; line-height: 1; filter: brightness(1.2) saturate(1.5);
    transform: scaleX(-1);
  }
  .cal-day.selected {
    background: linear-gradient(135deg, var(--accent), var(--pink));
    color: #fff; font-weight: 700;
    box-shadow: 0 2px 12px var(--accent-glow);
  }
  .cal-day.has-entries:not(.today):not(.selected) {
    background: linear-gradient(135deg, var(--green), #059669);
    color: #fff; font-weight: 700;
    box-shadow: 0 2px 12px rgba(16,185,129,0.3);
  }
  .cal-day.has-entries:not(.today):not(.selected) .dot { background: #fff; }
  .cal-day.today.has-entries { font-weight: 800; color: var(--cyan); }
  .cal-day.other-month { color: rgba(255,255,255,0.15); }
  .cal-day .dot {
    position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%; background: var(--pink);
  }
  .cal-day.selected .dot { background: #fff; }
  .cal-day.today .dot { background: #fff; }

  .day-events { margin-top: 12px; }
  .day-events h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .event-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .event-item:last-child { border-bottom: none; }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .event-time { color: var(--text-secondary); font-size: 12px; min-width: 50px; }
  .event-title { flex: 1; }
  .event-delete { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; padding: 4px; }

  /* ===== WEEKLY PLANNER ===== */
  .week-nav-bar { display: flex; align-items: center; justify-content: space-between; }
  .week-nav-bar button {
    background: var(--bg-secondary); border: 1px solid var(--border); font-size: 22px;
    color: var(--accent); padding: 4px 14px; cursor: pointer; border-radius: 10px;
  }
  .week-nav-bar span { font-size: 15px; font-weight: 700; }

  /* ===== DIARY VIEW ===== */
  .diary-week { padding: 4px 0; }
  .diary-day {
    display: flex; align-items: flex-start; gap: 0;
    padding: 14px 4px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    position: relative; overflow: hidden; border-radius: 10px;
    transition: background 0.15s;
  }
  .diary-day:last-child { border-bottom: none; }
  .diary-day:active { background: rgba(255,255,255,0.04); }
  .diary-day.is-today {
    background: rgba(124,58,237,0.08);
    border-bottom-color: transparent;
    margin: 2px 0;
  }
  .diary-date-col {
    width: 56px; flex-shrink: 0; text-align: center;
    display: flex; flex-direction: column; align-items: center; padding-top: 1px;
  }
  .diary-day-num {
    font-size: 26px; font-weight: 800; line-height: 1; color: var(--text-secondary);
  }
  .diary-day.is-today .diary-day-num { color: var(--accent); }
  .diary-day-name {
    font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.25);
    text-transform: uppercase; letter-spacing: 0.8px; margin-top: 3px;
  }
  .diary-day.is-today .diary-day-name { color: var(--accent); opacity: 0.8; }
  .diary-divider {
    width: 1.5px; flex-shrink: 0; align-self: stretch;
    background: rgba(255,255,255,0.07); margin: 0 14px;
    border-radius: 2px;
  }
  .diary-day.is-today .diary-divider {
    background: linear-gradient(to bottom, var(--accent), var(--pink)); opacity: 0.5;
  }
  .diary-entries { flex: 1; min-width: 0; padding-top: 3px; }
  .diary-entry-row {
    display: flex; align-items: baseline; gap: 7px; padding: 3px 0;
  }
  .diary-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
  }
  .diary-entry-time {
    font-size: 11px; color: var(--text-secondary); flex-shrink: 0; min-width: 36px;
  }
  .diary-entry-label {
    font-size: 13px; color: var(--text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; font-weight: 500;
  }
  .diary-day.is-today .diary-entry-label { color: var(--text); }
  .diary-note-row {
    display: flex; align-items: baseline; gap: 7px; padding: 3px 0;
  }
  .diary-note-text {
    font-size: 12px; color: var(--text-secondary); font-style: italic;
    line-height: 1.5;
  }
  .diary-empty-day {
    font-size: 12px; color: rgba(255,255,255,0.15); padding: 4px 0; font-style: italic;
  }

  .week-strip { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .week-strip::-webkit-scrollbar { display: none; }
  .week-day-card {
    flex: 1; min-width: 44px; text-align: center; padding: 10px 4px;
    border-radius: 12px; cursor: pointer;
    background: rgba(30, 30, 60, 0.4);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.09);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .week-day-card.has-entries:not(.today):not(.selected) {
    background: linear-gradient(135deg, var(--green), #059669);
    border-color: transparent;
    box-shadow: 0 2px 12px rgba(16,185,129,0.3);
  }
  .week-day-card.has-entries:not(.today):not(.selected) .wday,
  .week-day-card.has-entries:not(.today):not(.selected) .wdate { color: #fff; }
  .week-day-card.has-entries:not(.today):not(.selected) .wdot { background: #fff; }
  .week-day-card.today.has-entries { border-color: var(--cyan); }
  .week-day-card.today { border-color: var(--cyan); position: relative; }
  .week-day-card.today::after {
    content: '\1F98B'; position: absolute; top: 2px; right: 3px;
    font-size: 11px; line-height: 1; filter: brightness(1.2) saturate(1.5);
    transform: scaleX(-1);
  }
  .week-day-card.selected {
    background: linear-gradient(135deg, var(--accent), var(--pink));
    border-color: transparent;
    box-shadow: 0 2px 12px var(--accent-glow);
  }
  .week-day-card .wday { font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; }
  .week-day-card .wdate { font-size: 16px; font-weight: 700; margin-top: 4px; }
  .week-day-card.selected .wday, .week-day-card.selected .wdate { color: #fff; }
  .week-day-card .wdot { width: 5px; height: 5px; border-radius: 50%; background: var(--pink); margin: 4px auto 0; }
  .week-day-card.selected .wdot { background: #fff; }

  .week-timeline { position: relative; }
  .time-slot {
    display: flex; gap: 12px; min-height: 50px; padding: 6px 0;
    border-top: 1px solid var(--border);
  }
  .time-label { font-size: 11px; color: var(--text-secondary); min-width: 40px; padding-top: 2px; }
  .time-events { flex: 1; }
  .time-event {
    padding: 8px 12px; border-radius: 10px; margin-bottom: 4px;
    font-size: 13px; font-weight: 500;
  }

  /* ===== TASKS ===== */
  .task-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .task-input-row input {
    flex: 1; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border);
    font-size: 15px; background: var(--bg-secondary); outline: none; font-family: inherit;
    color: var(--text);
  }
  .task-input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .task-input-row input::placeholder { color: var(--text-secondary); }
  .task-input-row button {
    padding: 12px 20px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .task-input-row button:active { opacity: 0.85; }

  .task-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .task-item:last-child { border-bottom: none; }
  .task-checkbox {
    width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border-light);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    flex-shrink: 0; transition: all 0.2s;
  }
  .task-checkbox.checked {
    background: linear-gradient(135deg, var(--green), var(--cyan));
    border-color: transparent;
  }
  .task-checkbox.checked::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 800; }
  .task-text { flex: 1; font-size: 15px; }
  .task-text.done { text-decoration: line-through; color: var(--text-secondary); }
  .task-delete { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; padding: 4px; }

  .task-filters { display: flex; gap: 8px; margin-bottom: 12px; }
  .task-filter {
    padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); font-size: 13px; cursor: pointer; color: var(--text-secondary);
    font-weight: 500;
  }
  .task-filter.active {
    background: linear-gradient(135deg, var(--accent), var(--pink));
    color: #fff; border-color: transparent;
  }

  /* ===== APPOINTMENTS ===== */
  .appt-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .appt-input-row input, .appt-input-row select {
    flex: 1; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border);
    font-size: 15px; background: var(--bg-secondary); outline: none; font-family: inherit;
    color: var(--text);
  }
  .appt-input-row select { flex: 0.6; -webkit-appearance: none; appearance: none; }
  .appt-input-row input:focus, .appt-input-row select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .appt-input-row input::placeholder { color: var(--text-secondary); }
  .appt-input-row button {
    padding: 12px 20px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .appt-input-row button:active { opacity: 0.85; }

  .appt-item {
    display: flex; align-items: center; gap: 12px; padding: 14px;
    background: var(--card); border-radius: 12px; margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  .appt-item .appt-time-badge {
    background: var(--accent-light); color: var(--accent); font-size: 13px; font-weight: 700;
    padding: 6px 10px; border-radius: 10px; min-width: 65px; text-align: center; flex-shrink: 0;
  }
  .appt-item .appt-details { flex: 1; }

  /* ===== CLEANING LIST ===== */

  }

  /* ===== MODALS ===== */
  /* Morning pop-up */
  .morning-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 450; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  .morning-overlay.active { display: flex; }
  .morning-card {
    background: linear-gradient(160deg, #1e1e36 0%, #1a1a2e 100%);
    border-radius: 24px; width: 90%; max-width: 380px;
    padding: 28px 24px; animation: morningPop 0.4s ease-out;
    border: 1px solid var(--border-light);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    max-height: 80vh; overflow-y: auto;
  }
  @keyframes morningPop { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .morning-header {
    text-align: center; margin-bottom: 20px;
  }
  .morning-emoji { font-size: 40px; margin-bottom: 8px; }
  .morning-greeting {
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #ec4899, #f97316);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .morning-date { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .morning-section { margin-bottom: 16px; }
  .morning-section-title {

  }

    border-radius: 10px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--border);
  }
  .morning-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .morning-item-text { flex: 1; }
  .morning-item-time { font-size: 12px; color: var(--text-secondary); }
  .morning-empty { font-size: 13px; color: var(--text-secondary); padding: 4px 0; font-style: italic; }
  .morning-close {
    display: block; width: 100%; margin-top: 8px; padding: 14px;
    border-radius: 14px; border: none; font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer; color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .morning-close:active { transform: scale(0.97); }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 400; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card); border-radius: 24px 24px 0 0; width: 100%;
    max-width: 500px; padding: 28px 20px calc(24px + var(--safe-bottom));
    animation: slideUp 0.3s ease; border-top: 1px solid var(--border-light);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 18px; }
  .modal label { font-size: 12px; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal input, .modal select {
    width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border);
    font-size: 15px; margin-bottom: 14px; font-family: inherit; background: var(--bg-secondary);

  .modal input::placeholder { color: var(--text-secondary); }
  .modal input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .color-options { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }

  .modal-actions { display: flex; gap: 10px; margin-top: 8px; }

    font-weight: 700; cursor: pointer;

  .modal-save { background: linear-gradient(135deg, var(--accent), var(--pink)); color: #fff; }
  .modal-save:active { opacity: 0.85; }

  /* FAB */
  .fab {
    position: fixed; bottom: calc(var(--nav-height) + var(--safe-bottom) + 20px);
    right: 20px; width: 54px; height: 54px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    color: #fff; border: none; font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px var(--accent-glow); cursor: pointer; z-index: 200;
  }
  .fab:active { transform: scale(0.92); }
  .fab-menu {
    position: fixed; bottom: calc(var(--nav-height) + var(--safe-bottom) + 82px);
    right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 201;
    align-items: flex-end;
  }
  .fab-menu.active { display: flex; }
  .fab-menu-item {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    animation: fabSlideUp 0.2s ease-out both;
  }
  .fab-menu-item:nth-child(1) { animation-delay: 0.1s; }
  .fab-menu-item:nth-child(2) { animation-delay: 0.05s; }
  .fab-menu-item:nth-child(3) { animation-delay: 0s; }
  @keyframes fabSlideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fab-menu-label {
    background: var(--card); color: var(--text); font-size: 13px; font-weight: 600;

  .fab-overlay { position: fixed; inset: 0; z-index: 199; display: none; }

  .empty-state p { font-size: 14px; line-height: 1.5; }

  .day-notes-label {

  /* ===== DAY DETAIL OVERLAY ===== */
  /* ===== RIPPLE TAP EFFECT ===== */
  .ripple-wave {
    position: absolute; border-radius: 50%; pointer-events: none;
    background: rgba(255,255,255,0.18);
    transform: scale(0); animation: rippleExpand 0.55s ease-out forwards;

  @keyframes rippleExpand {
    to { transform: scale(4); opacity: 0; }
  }

  /* Swipe slide animation */
  @keyframes slideInRight { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
  @keyframes slideInLeft  { from { opacity:0; transform:translateX(-40px); } to { opacity:1; transform:translateX(0); } }
  .swipe-in-right { animation: slideInRight 0.22s ease-out both; }

  /* ===== CONFETTI ===== */
  .confetti-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 9999;
  }

  /* ===== AURORA ===== */
  .aurora {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0; pointer-events: none; overflow: hidden;
  }
  .aurora-blob {
    position: absolute; border-radius: 50%;
    filter: blur(90px); opacity: 0.18;
    will-change: transform;
  }
  .aurora-blob-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle at center, #7c3aed, transparent 70%);
    top: -180px; left: -120px;
    animation: aurora1 22s ease-in-out infinite;
  }
  .aurora-blob-2 {
    width: 420px; height: 420px;
    background: radial-gradient(circle at center, #ec4899, transparent 70%);
    top: 25%; right: -140px;
    animation: aurora2 28s ease-in-out infinite;
  }
  .aurora-blob-3 {
    width: 380px; height: 380px;
    background: radial-gradient(circle at center, #06b6d4, transparent 70%);
    bottom: 5%; left: 10%;
    animation: aurora3 20s ease-in-out infinite;
  }
  .aurora-blob-4 {
    width: 300px; height: 300px;
    background: radial-gradient(circle at center, #f97316, transparent 70%);
    bottom: 30%; right: 5%;
    animation: aurora4 24s ease-in-out infinite;
    opacity: 0.1;
  }
  @keyframes aurora1 {
    0%, 100% { transform: translate(0px, 0px) scale(1); }
    25%       { transform: translate(80px, 120px) scale(1.15); }
    50%       { transform: translate(160px, 40px) scale(0.95); }
    75%       { transform: translate(40px, 180px) scale(1.1); }
  }
  @keyframes aurora2 {
    0%, 100% { transform: translate(0px, 0px) scale(1); }
    25%       { transform: translate(-120px, 80px) scale(1.2); }
    50%       { transform: translate(-60px, -100px) scale(0.9); }
    75%       { transform: translate(-160px, 40px) scale(1.05); }
  }
  @keyframes aurora3 {
    0%, 100% { transform: translate(0px, 0px) scale(1); }
    33%       { transform: translate(100px, -80px) scale(1.15); }
    66%       { transform: translate(-70px, -120px) scale(0.88); }
  }
  @keyframes aurora4 {
    0%, 100% { transform: translate(0px, 0px) scale(1); }
    30%       { transform: translate(-90px, -60px) scale(1.2); }
    60%       { transform: translate(-140px, 60px) scale(0.9); }
  }

</style>
</head>

<script>
// ===== DATA =====
const STORAGE_KEY = 'samplanzData';
let data = loadData();
function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { events: {}, tasks: [], appointments: [], shopping: [], cleaning: [], selfcare: [] };
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
// Migrate old data
if (!data.shopping) data.shopping = [];
if (!data.cleaning) data.cleaning = [];
if (!data.selfcare) data.selfcare = [];
if (!data.appointments) data.appointments = [];
if (!data.dayNotes) data.dayNotes = {};
if (!data.recurringNotes) {
  data.recurringNotes = [{ id: 1, type: 'weekly', dayOfWeek: 1, text: 'Mum and Dad - Tablets' }];
  save();
}

// ===== ONE-TIME IMPORT FROM WEEK PLANNER APP =====
(function() {
  if (localStorage.getItem('samplanz_imported_v1')) return;
  const imported = {
    "2026-03-16": "Kittens born 🐱🐱",
    "2026-03-18": "8.45 bloods and pee dad\nContact lenses\nFags?",
    "2026-03-19": "Red day",
    "2026-03-20": "9.00 mum bloods and pee test",
    "2026-03-23": "8.30 docs me\n9.40 dad ECG\n10.00\nDad for results of blood",
    "2026-03-25": "Stay in. Lego.",
    "2026-03-27": "11.45 dad cardiology\nSinead gym",
    "2026-04-16": "2pm nurse Dad?",
    "2026-05-07": "8.45 ophthalmologist",
    "2026-05-10": "Bliss",
    "2026-05-13": "10am Dad catheter change",
    "2026-05-17": "Check in with Enrique for apartment WhatsApp.",
    "2026-05-18": "Valencià",
    "2026-05-19": "Valencià",
    "2026-05-20": "Valencià",
    "2026-05-21": "Valencià",
    "2026-05-22": "Calpe",
    "2026-05-23": "Home",
    "2026-05-25": "Sabbatical",
    "2026-05-26": "Sabbatical",
    "2026-05-27": "Sabbatical",
    "2026-05-28": "Sabbatical",
    "2026-05-29": "Sabbatical",
    "2026-06-01": "Look into next smear test"
  };
  for (const [date, text] of Object.entries(imported)) {
    if (!data.dayNotes[date]) {
      data.dayNotes[date] = text;
    } else if (!data.dayNotes[date].includes(text)) {
      data.dayNotes[date] = data.dayNotes[date] + '\n' + text;
    }
  }
  save();
  localStorage.setItem('samplanz_imported_v1', '1');
})();

// ===== RECURRING NOTES =====
function getRecurringNote(dateStr) {
  if (!data.recurringNotes) return null;
  const d = new Date(dateStr + 'T00:00:00');
  return data.recurringNotes.find(r =>
    (r.type === 'weekly' && r.dayOfWeek === d.getDay()) ||
    (r.type === 'monthly' && r.dayOfMonth === d.getDate())
  ) || null;
}

function getDateForTextarea(textareaId) {
  return textareaId === 'todayNotes' ? dateKey(today) : weekSelectedDate;
}

function loadNoteIntoTextarea(textareaId, dateStr) {
  let val = '';
  if (dateStr in data.dayNotes) {
    val = data.dayNotes[dateStr];
  } else {
    const rec = getRecurringNote(dateStr);
    if (rec) val = rec.text;
  }
  document.getElementById(textareaId).value = val;
  updateRecurBtn(textareaId, dateStr);

  const d = new Date(dateStr + 'T00:00:00');
  // Remove existing recurring for the same pattern
  data.recurringNotes = data.recurringNotes.filter(r =>
    !(r.type === 'weekly' && type === 'weekly' && r.dayOfWeek === d.getDay()) &&
    !(r.type === 'monthly' && type === 'monthly' && r.dayOfMonth === d.getDate())
  );
  if (type === 'weekly') {

    data.recurringNotes.push({ id: Date.now(), type: 'monthly', dayOfMonth: d.getDate(), text });
  }
  save();
  closeRecurPicker(textareaId);
  updateRecurBtn(textareaId, dateStr);
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  dt.setDate(diff);
  dt.setHours(0,0,0,0);
  return dt;
}
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
}
function formatShortDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

// ===== WEATHER =====
function getWeatherEmoji(code) {
  if (code === 0) return '\u2600\uFE0F';
  if (code <= 3) return '\u26C5';
  if (code <= 48) return '\uD83C\uDF2B\uFE0F';
  if (code <= 57) return '\uD83C\uDF26\uFE0F';
  if (code <= 67) return '\uD83C\uDF27\uFE0F';
  if (code <= 77) return '\u2744\uFE0F';
  if (code <= 82) return '\uD83C\uDF27\uFE0F';
  if (code <= 86) return '\uD83C\uDF28\uFE0F';
  if (code <= 99) return '\u26C8\uFE0F';
  return '\uD83C\uDF24\uFE0F';
}
function getWeatherDesc(code) {
  const descs = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
    45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
    56:'Freezing drizzle',57:'Heavy freezing drizzle',
    61:'Light rain',63:'Rain',65:'Heavy rain',66:'Freezing rain',67:'Heavy freezing rain',
    71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',
    80:'Light showers',81:'Showers',82:'Heavy showers',
    85:'Light snow showers',86:'Heavy snow showers',
    95:'Thunderstorm',96:'Thunderstorm with hail',99:'Heavy thunderstorm with hail'};
  return descs[code] || 'Unknown';
}
async function loadWeather() {
  try {
    // La Nucia coordinates: 38.6097, -0.1074
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=38.6097&longitude=-0.1074&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=Europe%2FMadrid&forecast_days=1';
    const res = await fetch(url);
    const d = await res.json();
    const c = d.current;
    const daily = d.daily;
    document.getElementById('weatherIcon').textContent = getWeatherEmoji(c.weather_code);
    document.getElementById('weatherTemp').textContent = `${Math.round(c.temperature_2m)}\u00B0C`;
    document.getElementById('weatherDesc').textContent = getWeatherDesc(c.weather_code);
    document.getElementById('weatherWind').innerHTML = `\uD83D\uDCA8 ${Math.round(c.wind_speed_10m)} km/h`;
    document.getElementById('weatherHumidity').innerHTML = `\uD83D\uDCA7 ${c.relative_humidity_2m}%`;
    document.getElementById('weatherHiLo').innerHTML = `<div class="hi">${Math.round(daily.temperature_2m_max[0])}\u00B0</div><div class="lo">${Math.round(daily.temperature_2m_min[0])}\u00B0</div>`;
    document.getElementById('weatherWidget').style.display = 'flex';
  } catch(e) { console.log('Weather unavailable', e); }
}

function showMorningPopup() {
  const lastShown = localStorage.getItem('samplanz_morning_shown');
  const todayStr = dateKey(today);
  if (lastShown === todayStr) return; // Already shown today

  const h = today.getHours();
  let emoji = '&#9728;&#65039;';
  let greeting = 'Good morning, Sam!';
  if (h >= 17) { emoji = '&#127769;'; greeting = 'Good evening, Sam!'; }
  else if (h >= 12) { emoji = '&#9996;&#65039;'; greeting = 'Good afternoon, Sam!'; }

  document.getElementById('morningEmoji').innerHTML = emoji;
  document.getElementById('morningGreeting').textContent = greeting;
  document.getElementById('morningDate').textContent = today.toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

  const todayKey = dateKey(today);
  const events = (data.events[todayKey] || []).sort((a,b) => (a.time||'').localeCompare(b.time||''));
  const appts = data.appointments.filter(a => a.date === todayKey).sort((a,b) => a.time.localeCompare(b.time));
  const tasks = data.tasks.filter(t => !t.done);
  let html = '';

  // Weather in morning popup
  try {
    const wUrl = 'https://api.open-meteo.com/v1/forecast?latitude=38.6097&longitude=-0.1074&current=temperature_2m,weather_code&timezone=Europe%2FMadrid';
    fetch(wUrl).then(r => r.json()).then(w => {
      const weatherHtml = `<div class="morning-section"><div class="morning-item" style="justify-content:center;gap:10px;font-size:16px;">
        <span>${getWeatherEmoji(w.current.weather_code)}</span>
        <span style="font-weight:700;">${Math.round(w.current.temperature_2m)}\u00B0C</span>
        <span style="color:var(--text-secondary);font-size:13px;">${getWeatherDesc(w.current.weather_code)}</span>
      </div></div>`;
      const summary = document.getElementById('morningSummary');
      summary.innerHTML = weatherHtml + summary.innerHTML;
    }).catch(() => {});
  } catch(e) {}

  // Events
  if (events.length > 0) {
    html += '<div class="morning-section"><div class="morning-section-title">&#9733; Events</div>';
    events.forEach(e => {
      html += `<div class="morning-item">
        <div class="morning-item-dot" style="background:${e.color || 'var(--cyan)'}"></div>
        <div class="morning-item-text">${escHtml(e.name)}</div>
        <div class="morning-item-time">${e.time || 'All day'}</div>
      </div>`;
    });
    html += '</div>';
  }

  // Appointments
  if (appts.length > 0) {
    html += '<div class="morning-section"><div class="morning-section-title">&#128197; Appointments</div>';
    appts.forEach(a => {
      html += `<div class="morning-item">
        <div class="morning-item-dot" style="background:var(--accent)"></div>
        <div class="morning-item-text">${escHtml(a.title)}</div>
        <div class="morning-item-time">${formatApptTime(a.time)}</div>
      </div>`;
    });
    html += '</div>';
  }

  // Tasks
  if (tasks.length > 0) {
    html += '<div class="morning-section"><div class="morning-section-title">&#9745;&#65039; Tasks</div>';
    tasks.slice(0, 5).forEach(t => {
      html += `<div class="morning-item">
        <div class="morning-item-dot" style="background:var(--pink)"></div>
        <div class="morning-item-text">${escHtml(t.text)}</div>
      </div>`;
    });
    if (tasks.length > 5) html += `<div class="morning-empty">+ ${tasks.length - 5} more</div>`;
    html += '</div>';
  }

  if (!html) {
    html = '<div class="morning-section"><div class="morning-empty">Nothing planned for today — enjoy your day! &#127796;</div></div>';
  }

  document.getElementById('morningSummary').innerHTML = html;
  document.getElementById('morningPopup').classList.add('active');
}

function saveNoteFromModal() {
  const text = document.getElementById('noteModalText').value.trim();
  const date = document.getElementById('noteModalDate').value;
  if (!text || !date) return;
  if (noteRepeat !== 'none') {
    // Save as a recurring note
    const d = new Date(date + 'T00:00:00');
    data.recurringNotes = data.recurringNotes.filter(r =>
      !(r.type === 'weekly' && noteRepeat === 'weekly' && r.dayOfWeek === d.getDay()) &&
      !(r.type === 'monthly' && noteRepeat === 'monthly' && r.dayOfMonth === d.getDate())
    );
    data.recurringNotes.push({
      id: Date.now(),
      type: noteRepeat,
      dayOfWeek: noteRepeat === 'weekly' ? d.getDay() : undefined,
      dayOfMonth: noteRepeat === 'monthly' ? d.getDate() : undefined,
      text
    });
  } else {
    const existing = data.dayNotes[date] || '';
    data.dayNotes[date] = existing ? existing + '\n' + text : text;
  }
  save(); closeNoteModal(); renderAll(); loadDayNotes();
}

function getRepeatDates(startDate, repeat) {
  if (repeat === 'none') return [startDate];
  const dates = [];
  const start = new Date(startDate + 'T00:00:00');
  const limit = repeat === 'weekly' ? 104 : 24; // 2 years
  for (let i = 0; i < limit; i++) {
    const d = new Date(start);
    if (repeat === 'weekly') d.setDate(d.getDate() + i * 7);
    if (repeat === 'monthly') d.setMonth(d.getMonth() + i);
    dates.push(dateKey(d));
  }
  return dates;
}

function renderWeek() {
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  document.getElementById('weekLabel').textContent = `${fmt(weekStart)} \u2014 ${fmt(weekEnd)}`;

  const todayKey = dateKey(today);
  let html = '';

  for (let i = 0; i < 7; i++) {

    const isToday = key === todayKey;

    const events = (data.events[key] || []).sort((a,b) => (a.time||'').localeCompare(b.time||''));
    const appts  = data.appointments.filter(a => a.date === key).sort((a,b) => a.time.localeCompare(b.time));
    const rec    = getRecurringNote(key);
    const noteRaw = data.dayNotes[key] !== undefined ? data.dayNotes[key] : (rec ? rec.text : '');
    const noteLines = noteRaw.trim() ? noteRaw.trim().split('\n').filter(l => l.trim()) : [];

    let entriesHtml = '';

      entriesHtml += `<div class="diary-entry-row">
        <div class="diary-dot" style="background:var(--accent)"></div>
        <span class="diary-entry-time">${formatApptTime(a.time)}</span>

      </div>`;
    });

    events.forEach(e => {
      entriesHtml += `<div class="diary-entry-row">
        <div class="diary-dot" style="background:${e.color || 'var(--cyan)'}"></div>
        <span class="diary-entry-time">${e.time || 'All day'}</span>
        <span class="diary-entry-label">${escHtml(e.name)}</span>
      </div>`;
    });

    noteLines.forEach((line, idx) => {
      entriesHtml += `<div class="diary-note-row">
        ${idx === 0 ? '<div class="diary-dot" style="background:var(--green)"></div>' : '<div class="diary-dot" style="background:transparent"></div>'}
        <span class="diary-note-text">${escHtml(line)}</span>
      </div>`;
    });

    if (!entriesHtml) {
      entriesHtml = `<div class="diary-empty-day">Nothing planned</div>`;
    }

    html += `<div class="diary-day ${isToday ? 'is-today' : ''}" onclick="openDayDetail('${key}')">
      <div class="diary-date-col">
        <div class="diary-day-num">${dayNum}</div>

      </div>

  document.getElementById('diaryList').innerHTML = html;
}

// ===== CALENDAR =====
function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
  const grid = document.getElementById('calGrid');
  grid.classList.remove('swipe-in-right','swipe-in-left');
  void grid.offsetWidth;
  grid.classList.add(delta > 0 ? 'swipe-in-right' : 'swipe-in-left');
}

function renderCalendar() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent = `${months[calMonth]} ${calYear}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'day-label'; el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calYear, calMonth, 1);
  let startDay = firstDay.getDay() - 1;
  if (startDay < 0) startDay = 6;
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(calYear, calMonth, 0).getDate();
  const todayKey = dateKey(today);

  for (let i = startDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month'; el.textContent = daysInPrevMonth - i;
    grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    el.className = 'cal-day';
    if (key === todayKey) el.classList.add('today');
    if (key === selectedDate) el.classList.add('selected');
    const hasEntries = (data.events[key] && data.events[key].length > 0) || data.appointments.some(a => a.date === key) || !!(data.dayNotes[key] && data.dayNotes[key].trim()) || !!getRecurringNote(key);
    if (hasEntries) el.classList.add('has-entries');
    el.textContent = d;
    if (hasEntries) {
      const dot = document.createElement('div'); dot.className = 'dot'; el.appendChild(dot);
    }
    el.onclick = () => { selectedDate = key; renderCalendar(); renderDayEvents(); updateSummary(); openDayDetail(key); };
    grid.appendChild(el);
  }
  const totalCells = startDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month'; el.textContent = i;
    grid.appendChild(el);
  }
  renderDayEvents();
}

function buildTimeOptions() {
  const selectors = [document.getElementById('apptTime'), document.getElementById('apptModalTime')];
  selectors.forEach(sel => {
    if (!sel) return;
    for (let h = 7; h <= 23; h++) {
      for (let m = 0; m < 60; m += 5) {
        const hh = String(h).padStart(2, '0');
        const mm = String(m).padStart(2, '0');
        const val = `${hh}:${mm}`;
        const label = `${h > 12 ? h - 12 : (h === 0 ? 12 : h)}:${mm} ${h >= 12 ? 'PM' : 'AM'}`;
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = label;
        sel.appendChild(opt);
      }
    }
    // Add custom time option
    const custom = document.createElement('option');
    custom.value = 'custom';
    custom.textContent = 'Custom time...';
    sel.appendChild(custom);
    sel.addEventListener('change', function() {
      if (this.value === 'custom') {
        const input = prompt('Enter time (e.g. 6:30 AM or 14:25):');
        if (input) {
          const parsed = parseCustomTime(input);
          if (parsed) {
            // Add option if not already present
            let found = false;
            for (let o of this.options) { if (o.value === parsed) { found = true; break; } }
            if (!found) {
              const newOpt = document.createElement('option');
              newOpt.value = parsed;
              const ph = parseInt(parsed.split(':')[0]);
              const pm = parsed.split(':')[1];
              newOpt.textContent = `${ph > 12 ? ph - 12 : (ph === 0 ? 12 : ph)}:${pm} ${ph >= 12 ? 'PM' : 'AM'}`;
              this.insertBefore(newOpt, this.lastElementChild);
            }
            this.value = parsed;
          } else {
            alert('Could not understand that time. Try formats like "6:30 AM" or "14:25".');
            this.value = '';
          }
        } else {
          this.value = '';
        }
      }
    });
  });
}
function parseCustomTime(input) {
  input = input.trim().toUpperCase();
  // Try 12h format: 6:30 AM, 6:30AM, 6:30 PM
  let match = input.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/);
  if (match) {
    let h = parseInt(match[1]);
    const m = parseInt(match[2]);
    const ampm = match[3];
    if (ampm === 'PM' && h < 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    if (h >= 0 && h <= 23 && m >= 0 && m <= 59) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }
  // Try 24h format: 14:25
  match = input.match(/^(\d{1,2}):(\d{2})$/);
  if (match) {
    const h = parseInt(match[1]);
    const m = parseInt(match[2]);
    if (h >= 0 && h <= 23 && m >= 0 && m <= 59) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }
  return null;
}

function handleShopPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxSize = 300;
      let w = img.width, h = img.height;
      if (w > h) { if (w > maxSize) { h = h * maxSize / w; w = maxSize; } }
      else { if (h > maxSize) { w = w * maxSize / h; h = maxSize; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      if (!data.shopPhotos[activeShopCat]) data.shopPhotos[activeShopCat] = [];
      data.shopPhotos[activeShopCat].push({ id: Date.now(), src: dataUrl });
      save(); renderShopPhotos();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ===== CLEANING (recurring every Saturday) =====
function getSaturday() {
  // Get the most recent Saturday (including today if it's Saturday)
  const d = new Date(today);
  const day = d.getDay(); // 0=Sun, 6=Sat
  const diff = day >= 6 ? 0 : day + 1; // days since last Saturday
  d.setDate(d.getDate() - diff);
  return dateKey(d);
}

const currentWeekSat = getSaturday();

// Auto-reset: clear completions from previous weeks
function autoResetCleaning() {
  data.cleaning.forEach(task => {
    if (task.completedWeek && task.completedWeek !== currentWeekSat) {
      task.completedWeek = null;
    }
  });
  save();
}
autoResetCleaning();

function addCleanTask() {
  const input = document.getElementById('cleanInput');
  const text = input.value.trim();
  if (!text) return;
  data.cleaning.push({ id: Date.now(), text, completedWeek: null });
  save(); input.value = ''; renderAll();
}

function toggleCleanTask(id) {
  const task = data.cleaning.find(c => c.id === id);
  if (!task) return;
  const wasIncomplete = task.completedWeek !== currentWeekSat;
  task.completedWeek = task.completedWeek === currentWeekSat ? null : currentWeekSat;
  save(); renderAll();
  if (wasIncomplete) launchConfetti();
}

function launchConfetti() {
  const colors = ['#7c3aed','#ec4899','#06b6d4','#10b981','#f97316','#facc15','#ef4444','#8b5cf6','#fff'];
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);

  const pieces = Array.from({ length: 60 }, () => {
    const el = document.createElement('div');
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = 6 + Math.random() * 8;
    const isCircle = Math.random() > 0.66;
    const isRect = !isCircle && Math.random() > 0.5;
    el.style.cssText = `position:absolute;width:${isRect ? size*0.5 : size}px;height:${size}px;background:${color};border-radius:${isCircle ? '50%' : '2px'};`;
    container.appendChild(el);
    return {
      el,
      x: Math.random() * window.innerWidth,
      y: -20,
      vx: (Math.random() - 0.5) * 4,
      vy: 1.5 + Math.random() * 3,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 12,
      delayFrames: Math.floor(Math.random() * 20),
      opacity: 1
    };
  });

  let frame = 0;
  function animate() {
    frame++;
    let alive = false;
    pieces.forEach(p => {
      if (frame < p.delayFrames) { alive = true; return; }
      p.vy += 0.12;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotV;
      if (p.y > window.innerHeight * 0.8) p.opacity = Math.max(0, p.opacity - 0.04);
      if (p.opacity > 0) alive = true;
      p.el.style.transform = `translate(${p.x}px,${p.y}px) rotate(${p.rot}deg)`;
      p.el.style.opacity = p.opacity;
    });
    if (alive && frame < 300) requestAnimationFrame(animate);
    else container.remove();
  }
  requestAnimationFrame(animate);
}

function deleteCleanTask(id) {
  data.cleaning = data.cleaning.filter(c => c.id !== id);
  save(); renderAll();
}

function resetCleanTasks() {
  data.cleaning.forEach(t => t.completedWeek = null);
  save(); renderAll();
}

function removeAllCleanTasks() {
  data.cleaning = [];
  save(); renderAll();
}

// ===== SELF CARE =====
function addSelfCareTask() {
  const input = document.getElementById('selfcareInput');
  const text = input.value.trim();
  if (!text) return;
  data.selfcare.push({ id: Date.now(), text, done: false });
  save(); input.value = ''; renderAll();
}

function toggleSelfCareTask(id) {
  const task = data.selfcare.find(c => c.id === id);
  if (!task) return;
  const wasIncomplete = !task.done;
  task.done = !task.done;
  save(); renderAll();
  if (wasIncomplete) launchConfetti();
}

function deleteSelfCareTask(id) {
  data.selfcare = data.selfcare.filter(c => c.id !== id);
  save(); renderAll();
}

function resetSelfCareTasks() {
  data.selfcare.forEach(t => t.done = false);
  save(); renderAll();
}

function removeAllSelfCareTasks() {
  data.selfcare = [];
  save(); renderAll();
}

function renderSelfCare() {
  const list = document.getElementById('selfcareList');
  const progressEl = document.getElementById('selfcareProgress');
  if (!list) return;

  if (data.selfcare.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">🌸</div><p>Add your self care tasks and check them off as you go!</p></div>';
    progressEl.innerHTML = '';
    return;
  }

  const total = data.selfcare.length;
  const done = data.selfcare.filter(c => c.done).length;
  const pct = Math.round((done / total) * 100);

  progressEl.innerHTML = `
    <div class="clean-progress-text">${done}/${total} done${pct === 100 ? ' \u2014 you\'re glowing! \u2728' : ''}</div>
    <div class="clean-progress-bar"><div class="clean-progress-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--pink),var(--accent))"></div></div>
  `;

  const undone = data.selfcare.filter(c => !c.done);
  const completed = data.selfcare.filter(c => c.done);

  let html = '';
  undone.forEach(c => {
    html += `<div class="clean-item">
      <div class="clean-check" onclick="toggleSelfCareTask(${c.id})"></div>
      <div class="clean-text">${escHtml(c.text)}</div>
      <button class="clean-delete" onclick="deleteSelfCareTask(${c.id})">\u00d7</button>
    </div>`;
  });
  if (completed.length > 0) {
    html += `<div style="font-size:12px;color:var(--text-secondary);font-weight:600;padding:12px 0 6px;text-transform:uppercase;">Done (${completed.length})</div>`;
    completed.forEach(c => {
      html += `<div class="clean-item">
        <div class="clean-check checked" onclick="toggleSelfCareTask(${c.id})"></div>
        <div class="clean-text done">${escHtml(c.text)}</div>
        <button class="clean-delete" onclick="deleteSelfCareTask(${c.id})">\u00d7</button>
      </div>`;
    });
  }
  list.innerHTML = html;
}

function renderCleaning() {
  const list = document.getElementById('cleanList');
  const progressEl = document.getElementById('cleanProgress');

  if (data.cleaning.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">&#129529;</div><p>Add your cleaning tasks \u2014 they\'ll reset every Saturday!</p></div>';
    progressEl.innerHTML = '';
    return;
  }

  const total = data.cleaning.length;
  const done = data.cleaning.filter(c => c.completedWeek === currentWeekSat).length;
  const pct = Math.round((done / total) * 100);

  progressEl.innerHTML = `
    <div class="clean-progress-text">${done}/${total} done this week${pct === 100 ? ' \u2014 all clean!' : ''}</div>
    <div class="clean-progress-bar"><div class="clean-progress-fill" style="width:${pct}%"></div></div>
  `;

  const undone = data.cleaning.filter(c => c.completedWeek !== currentWeekSat);
  const completed = data.cleaning.filter(c => c.completedWeek === currentWeekSat);

  let html = '';
  undone.forEach(c => {
    html += `<div class="clean-item">
      <div class="clean-check" onclick="toggleCleanTask(${c.id})"></div>
      <div class="clean-text">${escHtml(c.text)}</div>
      <button class="clean-delete" onclick="deleteCleanTask(${c.id})">\u00d7</button>
    </div>`;
  });
  if (completed.length > 0) {
    html += `<div style="font-size:12px;color:var(--text-secondary);font-weight:600;padding:12px 0 6px;text-transform:uppercase;">Done this week (${completed.length})</div>`;
    completed.forEach(c => {
      html += `<div class="clean-item">
        <div class="clean-check checked" onclick="toggleCleanTask(${c.id})"></div>
        <div class="clean-text done">${escHtml(c.text)}</div>
        <button class="clean-delete" onclick="deleteCleanTask(${c.id})">\u00d7</button>
      </div>`;
    });
  }
  list.innerHTML = html;
}

// ===== UTILS =====
function escHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

// Close modals on backdrop
document.getElementById('eventModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('noteModal').addEventListener('click', function(e) { if (e.target === this) closeNoteModal(); });

// ===== SETTINGS / BACKUP =====
function openSettings() {
  document.getElementById('settingsSheet').classList.add('active');
}
function closeSettings() {
  document.getElementById('settingsSheet').classList.remove('active');
}

function exportData() {
  // Bundle both the main data and the import flag so nothing is lost
  const bundle = {
    samplanzData: localStorage.getItem(STORAGE_KEY),
    samplanz_imported_v1: localStorage.getItem('samplanz_imported_v1'),
    samplanz_morning_shown: localStorage.getItem('samplanz_morning_shown'),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'samplanz-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  closeSettings();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const bundle = JSON.parse(ev.target.result);
      // Restore all stored keys
      if (bundle.samplanzData)          localStorage.setItem(STORAGE_KEY, bundle.samplanzData);
      if (bundle.samplanz_imported_v1)  localStorage.setItem('samplanz_imported_v1', bundle.samplanz_imported_v1);
      if (bundle.samplanz_morning_shown) localStorage.setItem('samplanz_morning_shown', bundle.samplanz_morning_shown);
      closeSettings();
      // Reload so the freshly restored data takes effect
      setTimeout(() => location.reload(), 200);
    } catch(err) {
      alert('Could not read backup file — make sure you\'re importing a Samplanz backup .json file.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ===== RIPPLE TAP EFFECT =====
(function() {
  const RIPPLE_SELECTORS = [
    '.agenda-item', '.week-day-card', '.cal-day',
    '.summary-card', '.nav-item', '.fab-menu-btn',
    '.day-detail-back', '.recur-option', '.shop-tab',
    '.clean-action', '.shop-action', '.appt-btn-row button'
  ];

  function spawnRipple(el, x, y) {
    if (getComputedStyle(el).position === 'static') el.style.position = 'relative';
    el.style.overflow = 'hidden';
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height) * 1.4;
    const ripple = document.createElement('span');
    ripple.className = 'ripple-wave';
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${x - rect.left - size/2}px;top:${y - rect.top - size/2}px;`;
    el.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  }

  document.addEventListener('pointerdown', function(e) {
    const target = e.target.closest(RIPPLE_SELECTORS.join(','));
    if (target) spawnRipple(target, e.clientX, e.clientY);
  }, { passive: true });
})();

// ===== SWIPE GESTURES =====
(function() {
  // Generic swipe listener: attach to an element, fire onLeft/onRight
  // Only triggers if the swipe is clearly horizontal (dx > dy * 1.5) and long enough
  function addSwipe(el, onLeft, onRight) {
    let x0 = null, y0 = null, startTime = null;
    el.addEventListener('touchstart', function(e) {
      if (e.touches.length !== 1) return;
      x0 = e.touches[0].clientX;
      y0 = e.touches[0].clientY;
      startTime = Date.now();
    }, { passive: true });
    el.addEventListener('touchend', function(e) {
      if (x0 === null) return;
      const dx = e.changedTouches[0].clientX - x0;
      const dy = e.changedTouches[0].clientY - y0;
      const dt = Date.now() - startTime;
      x0 = null; y0 = null;
      // Must be fast enough (<500ms), long enough (>45px), and more horizontal than vertical
      if (dt > 500 || Math.abs(dx) < 45 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
      if (dx < 0) onLeft();   // swipe left  → go forward
      else        onRight();  // swipe right → go back
    }, { passive: true });
  }

  // Week tab: swipe changes week
  addSwipe(
    document.getElementById('tab-week'),
    () => changeWeek(1),
    () => changeWeek(-1)
  );

  // Calendar tab: swipe changes month
  addSwipe(
    document.getElementById('tab-calendar'),
    () => changeMonth(1),
    () => changeMonth(-1)
  );

  // Day detail overlay: swipe left/right opens adjacent day
  document.getElementById('dayDetailOverlay').addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) return;
    this._sx = e.touches[0].clientX;
    this._sy = e.touches[0].clientY;
    this._st = Date.now();
  }, { passive: true });
  document.getElementById('dayDetailOverlay').addEventListener('touchend', function(e) {
    if (this._sx === undefined) return;
    const dx = e.changedTouches[0].clientX - this._sx;
    const dy = e.changedTouches[0].clientY - this._sy;
    const dt = Date.now() - this._st;
    delete this._sx; delete this._sy; delete this._st;
    if (dt > 500 || Math.abs(dx) < 45 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
    // Move to next or previous day
    const dir = dx < 0 ? 'next' : 'prev';
    const d = new Date(dayDetailDate + 'T00:00:00');
    d.setDate(d.getDate() + (dx < 0 ? 1 : -1));
    openDayDetail(d.toISOString().slice(0, 10), dir);
  }, { passive: true });
})();
